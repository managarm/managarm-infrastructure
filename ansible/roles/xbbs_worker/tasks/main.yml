---
- name: Collect xbbs-related facts
  become: yes
  become_user: xbbs
  xbbs_support_facts: ~

- name: Check for the existence of the unprivileged_userns_clone sysctl
  ansible.builtin.stat:
    path: /proc/sys/kernel/unprivileged_userns_clone
  register: u_uns_clone

- name: Enable usernses on Debian
  become: yes
  become_user: root
  when: u_uns_clone.stat.exists
  ansible.posix.sysctl:
    name: 'kernel.unprivileged_userns_clone'
    value: '1'
    sysctl_set: yes

- name: Check if worker user has subuids already
  ansible.builtin.command:
    cmd: "grep -c '^xbbs:' /etc/subuid"
  register: subuid_check
  changed_when: false
  failed_when: subuid_check.rc > 1

- name: Give it subuids
  become: yes
  become_user: root
  ansible.builtin.shell: |
    set -xe
    nf=$(awk -F: 'START { nf = 0 } { u=$2+$3; if (nf < u) nf = u } END { print nf }' /etc/subuid)
    usermod --add-subuids ${nf}-$((nf+65535)) xbbs
  when: subuid_check.stdout == "0"

- name: Check if worker user has subgids already
  ansible.builtin.command:
    cmd: "grep -c '^xbbs:' /etc/subgid"
  register: subgid_check
  changed_when: false
  failed_when: subgid_check.rc > 1

- name: Give it subgids
  become: yes
  become_user: root
  ansible.builtin.shell: |
    set -xe
    nf=$(awk -F: 'START { nf = 0 } { u=$2+$3; if (nf < u) nf = u } END { print nf }' /etc/subgid)
    usermod --add-subgids ${nf}-$((nf+65535)) xbbs
  when: subgid_check.stdout == "0"

- name: Install xbstrap and xbbs from git
  become: yes
  become_user: root
  ansible.builtin.pip:
    state: latest
    name:
      # Valideer updated for py3.11
      - git+https://github.com/managarm/xbstrap.git
      - git+https://github.com/managarm/xbbs.git
      - y4
    virtualenv: '{{ xbbs_virtualenv }}'
  notify: xbbs_worker

- name: Install systemd service files
  become: yes
  become_user: root
  ansible.builtin.template:
    src: "xbbs-worker.service.j2"
    dest: "/etc/systemd/system/xbbs-worker.service"
    owner: root
    group: root
    mode: 0644
  notify: xbbs_worker

- name: Install worker configuration file
  become: yes
  become_user: root
  ansible.builtin.template:
    src: "worker.toml.j2"
    dest: "/etc/xbbs/worker.toml"
    owner: xbbs
    group: xbbs
    mode: 0644
  notify: xbbs_worker

- name: Create cbuildrt home
  become: yes
  become_user: root
  ansible.builtin.file:
    path: "/var/lib/cbuildrt"
    state: directory
    owner: xbbs
    group: xbbs
    mode: 0755
  notify: update_cbuildrt_rootfs

- name: Create xbstrap home
  become: yes
  become_user: root
  ansible.builtin.file:
    path: "{{ xbbs_cfg.xbstrap_home }}"
    state: directory
    owner: xbbs
    group: xbbs
    mode: 0755

- name: Create xbstrap home bin directory
  become: yes
  become_user: xbbs
  ansible.builtin.file:
    path: "{{ xbbs_cfg.xbstrap_home }}/bin"
    state: directory
    mode: 0755

- name: Download cbuildrt from GitHub releases
  become: yes
  become_user: xbbs
  ansible.builtin.get_url:
    url: "https://github.com/managarm/cbuildrt/releases/download/v0.1.4/cbuildrt-linux-x86_64-static.tar"
    dest: "{{ xbbs_cfg.xbstrap_home }}/cbuildrt-linux-amd64-static.tar"
    checksum: "sha256:87659bb1d1ae100649d54a19b5ebc76496de36303e0ed6258efe031096e42042"
    mode: 0644

- name: Unarchive cbuildrt
  become: yes
  become_user: xbbs
  ansible.builtin.unarchive:
    src: "{{ xbbs_cfg.xbstrap_home }}/cbuildrt-linux-amd64-static.tar"
    dest: "{{ xbbs_cfg.xbstrap_home }}/bin"
    remote_src: yes

- name: Install update script
  become: yes
  become_user: xbbs
  ansible.builtin.template:
    src: "update_rootfs.sh.j2"
    dest: "{{ xbbs_cfg.xbstrap_home }}/update_rootfs.sh"
    mode: 0755
  notify: update_cbuildrt_rootfs

- name: Install the rootfs update cronjob
  become: yes
  become_user: xbbs
  ansible.builtin.cron:
    name: 'xbbs-worker-update-rootfs'
    minute: '0'
    hour: '21'
    job: . /etc/profile; "{{ xbbs_cfg.xbstrap_home }}/update_rootfs.sh"

